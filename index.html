<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel App V3</title>
  <link rel="stylesheet" href="style.css"/>
</head>

<body>

<div class="phone">

  <!-- HERO -->
  <header class="hero">
    <div class="country">
      🇦🇹 → 🇨🇿 → 🇭🇺
    </div>

    <h1>유럽 여행</h1>

    <p class="date">2026.10.28 ~ 2026.11.10</p>

    <div class="d-day">D-115</div>
  </header>

  <!-- WALLET -->
  <section class="card wallet">
    <div class="card-title">💳 공동지갑 잔액</div>

    <div class="balance">
      €682.45
    </div>

    <div class="sub-balance">
      ≈ ₩1,084,000
    </div>
  </section>
   <!-- NEXT SCHEDULE -->
  <section class="card">
    <h2>✈️ 다음 일정</h2>

    <div class="schedule-title">
      항공권 결제
    </div>

    <div class="schedule-time">
      2026.10.31 09:20
    </div>

    <div class="badge">
      D-8
    </div>
  </section>


  <!-- SETTLEMENT -->
  <section class="card split-card">

    <div class="split-box">
      <div class="name">주혜</div>
      <div class="plus">+₩326,500</div>
    </div>

    <div class="split-box">
      <div class="name">정은</div>
      <div class="minus">-₩326,500</div>
    </div>

  </section>


  <!-- TODAY / TOTAL -->
  <section class="grid">

    <div class="card small">
      <h3>💰 오늘 사용</h3>
      <p>€36.80</p>
    </div>

    <div class="card small">
      <h3>🧳 이번 여행</h3>
      <p>€214.60</p>
    </div>

  </section>


  <!-- HISTORY -->
  <section class="card">
    <h2>🧾 최근 거래</h2>

    <div class="row">
      <span>🍜 라멘</span>
      <b>-€18</b>
    </div>

    <div class="row">
      <span>🚇 지하철</span>
      <b>-€4.20</b>
    </div>

    <div class="row">
      <span>☕ 카페</span>
      <b>-€5.80</b>
    </div>
  </section>
    <!-- ADD BUTTON -->
  <button class="add-btn">
    ＋ 거래 등록
  </button>


  <!-- BOTTOM NAV -->
  <nav class="bottom">

    <div class="active">🏠<br>홈</div>
    <div>💳<br>거래</div>

    <div class="plus-btn">＋</div>

    <div>📅<br>일정</div>
    <div>👥<br>정산</div>

  </nav>

</div> <!-- phone end -->

<script src="app.js"></script>
</body>
</html>
