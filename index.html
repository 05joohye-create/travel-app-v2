<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel App V3</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="phone">

  <!-- HERO -->
  <header class="hero">
    <div class="country">🇦🇹 → 🇨🇿 → 🇭🇺</div>
    <h1>유럽 여행</h1>
    <p class="date">2026.10.28 ~ 2026.11.10</p>
    <div class="d-day" id="dday">D-115</div>
  </header>

  <!-- WALLET -->
  <section class="card">
    <h2>💳 공동지갑</h2>
    <div class="row"><span>트래블카드</span><strong>€682.45</strong></div>
    <div class="row"><span>현금</span><strong>€120</strong></div>
  </section>

  <!-- NEXT SCHEDULE -->
  <section class="card">
    <h2>✈️ 다음 일정</h2>
    <div class="schedule">
      <div class="title">항공권 결제</div>
      <div class="sub">2026.10.31 09:20</div>
      <div class="badge">D-8</div>
    </div>
  </section>

  <!-- SETTLEMENT -->
  <section class="card">
    <h2>💰 정산</h2>
    <div class="row"><span>주희</span><strong>+₩326,500</strong></div>
    <div class="row"><span>정은</span><strong>-₩326,500</strong></div>
  </section>

  <!-- TRANSACTIONS -->
  <section class="card">
    <h2>🧾 최근 거래</h2>
    <div id="list"></div>
  </section>

</div>

<!-- FLOAT BTN -->
<div class="floating-btn" onclick="addItem()">+</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <div>🏠<br/>홈</div>
  <div>💳<br/>거래</div>
  <div class="active">➕</div>
  <div>📅<br/>일정</div>
  <div>👤<br/>더보기</div>
</nav>

<script src="app.js"></script>
</body>
</html>
