<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

<header class="hero">

<div class="top">
<div class="menu">☰</div>
<div class="bell">🔔</div>
</div>

<div class="country">
🇦🇹 → 🇨🇿 → 🇭🇺
</div>

<h1>유럽 여행</h1>

<p>2026.10.28 ~ 2026.11.10</p>

<div class="day">D-115</div>

</header>


<section class="wallet">

<div class="wallet-text">

<div class="title">
💳 공동지갑 잔액
</div>

<h2>€682.45</h2>

<p>≈ ₩1,084,000</p>

</div>

<div class="wallet-icon">
💳
</div>

</section>



<section class="card">

<h3>⚖️ 현재 정산</h3>

<div class="split">

<div>

<div class="avatar purple">J</div>

<h4>주혜</h4>

<span class="plus">+₩326,500</span>

</div>

<div>

<div class="avatar yellow">J</div>

<h4>정은</h4>

<span class="minus">-₩326,500</span>

</div>

</div>

</section>



<section class="grid">

<div class="card">

<h3>💶 오늘 사용</h3>

<h2>€36.80</h2>

<p>≈ ₩58,000</p>

</div>

<div class="card">

<h3>🧳 이번 여행</h3>

<h2>€214.60</h2>

<p>≈ ₩345,000</p>

</div>

</section>



<button class="add-btn">

＋ 거래 등록

</button>



<section class="card">

<div class="history-title">

<h3>🧾 최근 거래</h3>

<span>더보기 ></span>

</div>

<div class="history">

<span>🍜 라멘</span>

<strong>-€18</strong>

</div>

<div class="history">

<span>🚇 지하철</span>

<strong>-€4.20</strong>

</div>

<div class="history">

<span>☕ 카페</span>

<strong>-€5.80</strong>

</div>

</section>



<nav class="bottom">

<div>🏠<br>홈</div>

<div>📄<br>거래</div>

<div class="plus-btn">＋</div>

<div>💳<br>지갑</div>

<div>👥<br>정산</div>

</nav>

</div>

<script src="app.js"></script>

</body>
</html>
