<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel App V3</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="phone">

  <!-- HERO -->
  <header class="hero">
    <div class="country">🇦🇹 → 🇨🇿 → 🇭🇺</div>

    <h1>유럽 여행</h1>

    <p class="date">2026.10.28 ~ 2026.11.10</p>

    <div class="d-day">D-115</div>
  </header>

  <!-- WALLET -->
  <section class="card wallet">
    <h2>💳 공동지갑</h2>

    <div class="balance">
      <div>트래블카드</div>
      <strong>€682.45</strong>
    </div>

    <div class="balance">
      <div>현금</div>
      <strong>€120</strong>
    </div>

    <a href="#">다른 통화 보기</a>
  </section>

  <!-- NEXT SCHEDULE (🔥 업그레이드 버전) -->
  <section class="card next-schedule">

    <div class="section-title">✈️ 다음 일정</div>

    <div class="schedule-card">

      <div class="schedule-main">
        항공권 결제
      </div>

      <div class="schedule-date">
        2026.10.31 09:20
      </div>

      <div class="schedule-dday">
        D-8
      </div>

      <div class="schedule-sub">
        유럽 여행 / 공동 지출 준비
      </div>

    </div>

  </section>

  <!-- SETTLEMENT -->
  <section class="card settlement">
    <h2>💰 정산</h2>

    <div class="row">
      <div>주희</div>
      <div>+₩326,500</div>
    </div>

    <div class="row">
      <div>정은</div>
      <div>-₩326,500</div>
    </div>
  </section>

  <!-- HISTORY -->
  <section class="card history">
    <h2>🧾 최근 거래</h2>

    <div class="row">
      <span>🍜 라면</span>
      <strong>-€2.30</strong>
    </div>

    <div class="row">
      <span>🚇 지하철</span>
      <strong>-€4.20</strong>
    </div>

    <div class="row">
      <span>☕ 커피</span>
      <strong>-€5.80</strong>
    </div>
  </section>

</div>

<!-- ➕ 플로팅 버튼 -->
<div class="floating-btn">+</div>

<!-- 📱 하단 메뉴 -->
<nav class="bottom-nav">
  <div>🏠<br/>홈</div>
  <div>💳<br/>거래</div>
  <div class="active">➕</div>
  <div>📅<br/>일정</div>
  <div>👤<br/>더보기</div>
</nav>

<script src="app.js"></script>

</body>
</html>
