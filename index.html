<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<header class="hero">
    <div class="route">🇦🇹 → 🇨🇿 → 🇭🇺</div>
    <h1>유럽 여행</h1>
    <p>2026.10.28 ~ 2026.11.10 · D-115</p>
</header>

<section class="card">
    <h2>💳 공동예산 잔액</h2>

    <div class="line">
        <span>트래블카드</span>
        <strong>€682.45</strong>
    </div>

    <div class="line">
        <span>현금</span>
        <strong>🇦🇹 €120</strong>
    </div>

    <details>
        <summary>다른 통화 보기</summary>

        <div class="line">
            <span>🇨🇿 체코</span>
            <strong>400 CZK</strong>
        </div>

        <div class="line">
            <span>🇭🇺 헝가리</span>
            <strong>18,500 HUF</strong>
        </div>
    </details>

</section>

<section class="card">
    <h2>📅 다음 일정</h2>

    <p id="nextEvent">
        7월 12일 14:00 · 항공권 결제
    </p>

    <small>※ 현재는 예시 데이터입니다.</small>

</section>

<section class="grid">

<div class="card">
<h3>⚖️ 현재 정산</h3>

<p>
주혜 +₩326,500<br>
정은 -₩326,500
</p>

</div>

<div class="card">

<h3>💴 사용 현황</h3>

<p>
오늘 €36.80<br>
전체 €214.60
</p>

</div>

</section>

<section class="card">

<h2>🧾 최근 거래</h2>

<ul>
<li>🍜 라멘 €18</li>
<li>🚇 지하철 €4.20</li>
</ul>

</section>

<nav class="bottom">
🏠 거래 ＋ 일정 ⋯
</nav>

</div>

<script src="app.js"></script>

</body>
</html>
