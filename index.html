<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="phone">

<header class="hero">
    <div class="country">🇦🇹 → 🇨🇿 → 🇭🇺</div>

    <h1>유럽 여행</h1>

    <p>2026.10.28 ~ 2026.11.10</p>

    <span>D-115</span>
</header>

<section class="card budget">

<h2>💳 공동예산</h2>

<div class="row">
<span>트래블카드</span>
<strong>€682.45</strong>
</div>

<div class="row">
<span>현금</span>
<strong>🇦🇹 €120</strong>
</div>

<hr>

<details>
<summary>다른 통화 보기</summary>

<div class="row">
<span>🇨🇿 체코</span>
<span>400 CZK</span>
</div>

<div class="row">
<span>🇭🇺 헝가리</span>
<span>18,500 HUF</span>
</div>

</details>

</section>

<section class="card">

<h2>✈ 다음 일정</h2>

<h3>항공권 결제</h3>

<p>7월 12일 14:00</p>

<div class="dDay">D-8</div>

</section>

<div class="grid">

<section class="card">

<h2>⚖ 정산</h2>

<p>주혜 +₩326,500</p>

<p>정은 -₩326,500</p>

</section>

<section class="card">

<h2>💶 오늘 사용</h2>

<p>€36.80</p>

<small>전체 €214.60</small>

</section>

</div>

<section class="card">

<h2>🧾 최근 거래</h2>

<div class="history">
<span>🍜 라멘</span>
<strong>€18</strong>
</div>

<div class="history">
<span>🚇 지하철</span>
<strong>€4.20</strong>
</div>

<div class="history">
<span>☕ 카페</span>
<strong>€5.80</strong>
</div>

</section>

<nav class="bottom">

<div>🏠<br>홈</div>

<div>💳<br>거래</div>

<div>➕</div>

<div>📅<br>일정</div>

<div>👤<br>더보기</div>

</nav>

</div>

<script src="app.js"></script>

</body>
</html>
